services:
  # ============================================
  # Frontend – React + Vite served by Nginx
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: ${FRONTEND_IMAGE:-nutri-guesser-frontend:latest}
    container_name: nutri-guesser-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nutri-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ============================================
  # Backend – Quarkus Java 21
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-nutri-guesser-backend:latest}
    container_name: nutri-guesser-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - DB_JDBC_URL=${DB_JDBC_URL:-jdbc:h2:file:/data/h2/calorie-game-db;NON_KEYWORDS=USER}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - ./database/h2:/data/h2
    restart: unless-stopped
    networks:
      - nutri-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health/ready"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3


# ============================================
# Networks
# ============================================
networks:
  nutri-net:
    driver: bridge

