# --- Settings ---
quarkus.datasource.db-kind=h2

# --- DEVELOPMENT PROFILE  ---
%dev.quarkus.datasource.jdbc.url=jdbc:h2:file:./data/dev-db;NON_KEYWORDS=USER
%dev.quarkus.datasource.username=sa
%dev.quarkus.datasource.password=
%dev.quarkus.hibernate-orm.database.generation=update
%dev.quarkus.hibernate-orm.log.sql=false

# --- PRODUCTION PROFILE ---
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:h2:file:/data/h2/calorie-game-db;NON_KEYWORDS=USER}
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
quarkus.swagger-ui.always-include=true

# --- HTTP / CORS ---
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Disposition

# --- EXTERNE CLIENTS ---
quarkus.rest-client.openfoodfacts-product.url=https://world.openfoodfacts.org/api/v2
quarkus.rest-client.openfoodfacts-search.url=https://world.openfoodfacts.org

%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true

# Cataas API
quarkus.rest-client.cataas-api.url=https://cataas.com